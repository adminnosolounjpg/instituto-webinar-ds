<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Instituto Webinar — Testimonio individual</title>
  <link rel="stylesheet" href="../tokens.css">
  <style>
    .slide-bg {
      background-image: url('../assets/bg/fondos-10.jpg');
      background-size: cover;
      background-position: center;
    }
    .testimonial-decoration {
      display: inline-block;
      width: 110px;
      vertical-align: middle;
      margin-left: 24px;
    }
  </style>
</head>
<body>
<div class="iw-stage">
  <section class="iw-slide slide-bg">

    <div class="iw-testimonial">

      <!-- Foto rectangular redondeada (placeholder) -->
      <div class="iw-media iw-media--square" style="aspect-ratio: 1 / 1.15;">
        <!-- Reemplazar por: <img src="ruta-foto.jpg" alt="Pau Antó"> -->
      </div>

      <!-- Nombre + cargo + quote -->
      <div>
        <h1 class="iw-testimonial__name">Pau Antó</h1>
        <p class="iw-testimonial__role">Inversor inmobiliario</p>

        <p class="iw-testimonial__quote">
          David y Anna me ayudaron a simplificar mi oferta y a llegar a muchas más personas más allá del orgánico. Ahora me doy a conocer ante desconocidos con su sistema y genero un ROAS 10 con mi inversión en publicidad. <strong>Estás en muy buenas manos.</strong>
        </p>
      </div>

    </div>

  </section>
</div>
</body>
</html>
