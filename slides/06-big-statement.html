<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Instituto Webinar — Big statement con emoji</title>
  <link rel="stylesheet" href="../tokens.css">
  <style>
    .slide-bg {
      background-image: url('../assets/bg/fondos-10.jpg');
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body>
<div class="iw-stage">
  <section class="iw-slide slide-bg">

    <div class="iw-statement">

      <div class="iw-statement__emoji">😖</div>

      <h1 class="iw-statement__title">
        <span style="color: var(--iw-dark);">Seguramente</span>
        <span class="iw-hl">te sientas paralizado.</span>
      </h1>

      <p class="iw-statement__sub">
        Hay una parte de ti que no quiere equivocarse<br>
        y otra que no sabe cómo discernir qué funciona<br>
        y qué no entre tanta información.
      </p>

    </div>

  </section>
</div>
</body>
</html>
