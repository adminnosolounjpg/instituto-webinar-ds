<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Instituto Webinar — Content + bullets + media</title>
  <link rel="stylesheet" href="../tokens.css">
  <style>
    .slide-bg {
      background-image: url('../assets/bg/fondos-10.jpg');
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body>
<div class="iw-stage">
  <section class="iw-slide slide-bg">

    <div class="iw-layout-split">

      <!-- Columna izquierda: título + bullets -->
      <div>
        <h1 class="iw-h1">
          Esto es lo que veremos<br>
          <span class="iw-hl">a continuación:</span>
        </h1>

        <ul class="iw-checklist">
          <li>
            <svg class="iw-checklist__icon" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
              <circle cx="18" cy="18" r="18" fill="#3475EF"/>
              <path d="M11 18.5l5 5 10-11" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
            <span class="iw-body">Por qué estás aquí <strong>(el objetivo que tenemos para ti)</strong></span>
          </li>
          <li>
            <svg class="iw-checklist__icon" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
              <circle cx="18" cy="18" r="18" fill="#3475EF"/>
              <path d="M11 18.5l5 5 10-11" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
            <span class="iw-body">El motivo por el que te has sentido <strong>estancado o confundido</strong> con el marketing.</span>
          </li>
          <li>
            <svg class="iw-checklist__icon" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
              <circle cx="18" cy="18" r="18" fill="#3475EF"/>
              <path d="M11 18.5l5 5 10-11" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
            <span class="iw-body">Ejemplos reales que te mostrarán <strong>todo lo que es posible para ti</strong>.</span>
          </li>
        </ul>
      </div>

      <!-- Columna derecha: media placeholder -->
      <div class="iw-media"></div>

    </div>

  </section>
</div>
</body>
</html>
