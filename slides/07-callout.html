<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Instituto Webinar — Hand-drawn callout</title>
  <link rel="stylesheet" href="../tokens.css">
  <style>
    .slide-bg {
      background-image: url('../assets/bg/fondos-10.jpg');
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body>
<div class="iw-stage">
  <section class="iw-slide slide-bg">

    <div class="iw-callout">
      <div class="iw-callout__inner">

        <h1 class="iw-callout__top">
          Necesitas hacer<br>
          lo correcto.
        </h1>

        <p class="iw-callout__bottom">
          Pero, ¿sabes qué?, no necesitas <strong style="color: var(--iw-dark); font-weight: 700;">HACER MÁS.</strong>
        </p>

      </div>
    </div>

  </section>
</div>
</body>
</html>
