<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Instituto Webinar — Numbered list con icono</title>
  <link rel="stylesheet" href="../tokens.css">
  <style>
    .slide-bg {
      background-image: url('../assets/bg/fondos-10.jpg');
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body>
<div class="iw-stage">
  <section class="iw-slide slide-bg">

    <div class="iw-layout-split">

      <!-- Columna izquierda: card numerada -->
      <div class="iw-num">
        <div class="iw-num__head">
          <span class="iw-num__icon">
            <!-- Icono bombilla (representa "foco") - outline azul brand -->
            <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg" fill="none">
              <path d="M26 8 C18 8 13 13 13 21 C13 26 16 30 19 32 L19 37 L33 37 L33 32 C36 30 39 26 39 21 C39 13 34 8 26 8 Z"
                    stroke="#3475EF" stroke-width="2.5" stroke-linejoin="round"/>
              <line x1="22" y1="41" x2="30" y2="41" stroke="#3475EF" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="23" y1="45" x2="29" y2="45" stroke="#3475EF" stroke-width="2.5" stroke-linecap="round"/>
              <!-- líneas decorativas del filamento -->
              <path d="M22 22 L26 28 L30 22 M26 28 L26 35" stroke="#3475EF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <h2 class="iw-num__title">
            <span class="iw-hl">1.</span> Devolverte el foco
          </h2>
        </div>

        <p class="iw-body">
          Tanto si empiezas de 0 y estás <strong>saturado con tanta información</strong> aquí encontrarás tranquilidad.
        </p>
        <p class="iw-body">
          Vamos a enseñarte <strong>a enfocar tu energía</strong> en lo que de verdad mueve el negocio.
        </p>
      </div>

      <!-- Columna derecha: media placeholder -->
      <div class="iw-media"></div>

    </div>

  </section>
</div>
</body>
</html>
